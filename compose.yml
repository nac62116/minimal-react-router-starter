name: ${DOCKER_APP_NAME:-react-router-starter}

services:
  react-router-service:
    container_name: ${DOCKER_APP_NAME:-react-router-starter}
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: ${APP_NAME}
        BASE_URL: ${BASE_URL}
        DOMAIN: ${DOMAIN}
        SYSTEM_MAIL_SENDER: ${SYSTEM_MAIL_SENDER}
        MAILER_HOST: ${MAILER_HOST}
        MAILER_PORT: ${MAILER_PORT}
        MAILER_USER: ${MAILER_USER}
        MAILER_PASS: ${MAILER_PASS}
        ALLOW_INDEXING: ${ALLOW_INDEXING}
        MATOMO_URL: ${MATOMO_URL}
        MATOMO_SITE_ID: ${MATOMO_SITE_ID}
        SESSION_SECRETS: ${SESSION_SECRETS}
        HONEYPOT_SECRETS: ${HONEYPOT_SECRETS}
        CSRF_SECRETS: ${CSRF_SECRETS}
        MESSAGE_SECRETS: ${MESSAGE_SECRETS}
    expose:
      - "3000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - app-network

  nginx-service:
    image: nginx:1.28.2
    container_name: ${DOCKER_APP_NAME:-react-router-starter}-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/http-connection-upgrade-map.conf:/etc/nginx/conf.d/http-connection-upgrade-map.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "curl", "-f", "https://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge