name: "dev-mailpit"

services:
  mailpit:
    image: axllent/mailpit
    container_name: dev-mailpit
    ports:
      - 8025:8025   # Web UI
      - 1025:1025   # SMTP
    expose:
      - 1025
    networks:
      - react-router-starter-network

networks:
  react-router-starter-network:
    external: true
