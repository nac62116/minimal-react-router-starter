# Define request limit
limit_req_zone $binary_remote_addr zone=mylimit:10m rate=1000r/s;

# https
server {
	# Limit uploads to 6MB
	client_max_body_size 6M;

	server_name localhost;

	# Hide nginx version
	server_tokens off;

	# Security headers (Added manually on 24.04.25)
	add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
	add_header X-Content-Type-Options "nosniff" always;
	add_header Referrer-Policy "same-origin" always;

	location / {
		# Apply request limit
		limit_req zone=mylimit burst=1000 nodelay;

		# Proxying
		proxy_http_version 1.1;

		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		proxy_pass http://react-router-service:3000;
	}

	# SSL (Certbot -> To issue cert, add record pointing to this server (f.e. A record) and run certbot with certonly --nginx -d <your-domain-here>)
	ssl_certificate /etc/nginx/dev-certs/localhost.crt;
	ssl_certificate_key /etc/nginx/dev-certs/localhost.key;
	ssl_dhparam /etc/nginx/dev-certs/ssl-dhparams.pem;
	include /etc/nginx/certbot-files-for-dev/options-ssl-nginx.conf;

	# Ports
	listen [::]:443 ssl ipv6only=on; # managed by Certbot
	listen 443 ssl; # managed by Certbot
  http2 on;
}

# http: Redirect http to https
server {
	listen 80;
	listen [::]:80;
	server_name localhost;
	# Hide nginx version
  server_tokens off;

	return 301 https://$host$request_uri;
}